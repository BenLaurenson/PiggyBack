name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:run

  e2e:
    name: e2e (dev.piggyback.finance)
    runs-on: ubuntu-latest
    # Only run on push to dev — too flaky for PRs against main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: 20
      - name: Install dev-browser
        run: |
          npm install -g dev-browser
          dev-browser install
      - name: Wait for dev deployment to settle
        # Vercel typically finishes a build in ~3 min; give it 5.
        run: sleep 180
      - name: Run e2e suite
        env:
          BASE_URL: https://dev.piggyback.finance
        run: bash tests/e2e/run-all.sh

  lighthouse:
    name: Lighthouse (dev.piggyback.finance)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: 20
      - name: Install Chrome (for Lighthouse)
        uses: browser-actions/setup-chrome@v1
        id: chrome
      - name: Wait for dev deployment to settle
        run: sleep 180
      - name: Run Lighthouse
        env:
          BASE_URL: https://dev.piggyback.finance
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: bash scripts/lighthouse.sh
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: tests/lighthouse-reports/
          retention-days: 14

  build:
    name: Build
    needs: [test]
    runs-on: ubuntu-latest
    env:
      # Placeholders so `next build` can resolve module-level env reads. The
      # build doesn't actually call Supabase/Stripe; values are only checked
      # for shape (URLs / hex lengths).
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      UP_API_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      PROVISIONER_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  # Lint was previously broken by an open-ended `"ajv": ">=6.14.0"` override
  # in package.json that let pnpm pick ajv 8.x — incompatible with
  # @eslint/eslintrc 3.3.3 which expects ajv 6.x. Pinned to ^6.14.0 in the
  # commit that re-enabled this job.
